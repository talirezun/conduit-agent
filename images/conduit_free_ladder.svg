<svg width="100%" viewBox="0 0 680 330" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">
  <title>The Conduit Free Ladder</title>
  <desc>Four ways to run Conduit: opencode with a built-in free model, opencode with an OpenRouter free model, opencode with a local offline model, or Claude Cowork/Code. The first three are free; the last is about $20/month.</desc>
  <text x="40" y="30" fill="rgb(20,20,19)" font-size="14" font-weight="500">How to run Conduit — the Free Ladder</text>

  <!-- Rung 0 -->
  <g>
    <rect x="40" y="48" width="600" height="50" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
    <text x="60" y="68" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500">Rung 0 — opencode + built-in free model</text>
    <text x="60" y="86" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12">instant start · no account</text>
    <text x="620" y="73" text-anchor="end" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12">Free</text>
  </g>
  <!-- Rung 1 -->
  <g>
    <rect x="40" y="106" width="600" height="50" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
    <text x="60" y="126" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500">Rung 1 — opencode + OpenRouter free model</text>
    <text x="60" y="144" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12">free account · more model choice</text>
    <text x="620" y="131" text-anchor="end" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12">Free</text>
  </g>
  <!-- Rung 2 -->
  <g>
    <rect x="40" y="164" width="600" height="50" rx="8" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
    <text x="60" y="184" dominant-baseline="central" fill="rgb(8,80,65)" font-size="14" font-weight="500">Rung 2 — opencode + local model</text>
    <text x="60" y="202" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12">fully offline · maximum privacy</text>
    <text x="620" y="189" text-anchor="end" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12">Free</text>
  </g>
  <!-- Rung 3 -->
  <g>
    <rect x="40" y="222" width="600" height="50" rx="8" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
    <text x="60" y="242" dominant-baseline="central" fill="rgb(60,52,137)" font-size="14" font-weight="500">Rung 3 — Claude Cowork / Claude Code</text>
    <text x="60" y="260" dominant-baseline="central" fill="rgb(83,74,183)" font-size="12">best quality · native Excel</text>
    <text x="620" y="247" text-anchor="end" dominant-baseline="central" fill="rgb(83,74,183)" font-size="12">~$20/mo</text>
  </g>

  <text x="40" y="300" fill="rgb(61,61,58)" font-size="12">All four are set up the same way: install the app, then paste the Setup prompt.</text>
</svg>

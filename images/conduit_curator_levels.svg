<svg width="100%" viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'Anthropic Sans', -apple-system, system-ui, 'Segoe UI', sans-serif">
  <title>Installing The Curator — three levels, all by prompt</title>
  <desc>Level 1 installs the app locally (by prompt). Level 2 is the in-app onboarding wizard for the API key and first domain. Level 3 connects the my-curator MCP so the agent can query (by prompt). Level 4, ongoing, is feeding it and querying it — the more you add, the smarter the agent gets.</desc>
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="rgb(120,120,116)"/>
    </marker>
  </defs>

  <text x="40" y="28" fill="rgb(20,20,19)" font-size="14" font-weight="500">Installing The Curator — three levels, all by prompt</text>

  <!-- Level 1 -->
  <rect x="40" y="52" width="180" height="84" rx="10" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="130" y="78" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-size="13" font-weight="500">Level 1</text>
  <text x="130" y="98" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-size="12">Install the app</text>
  <text x="130" y="116" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-size="11">(prompt) · runs locally</text>

  <line x1="222" y1="94" x2="248" y2="94" stroke="rgb(120,120,116)" stroke-width="1.2" marker-end="url(#arrow2)"/>

  <!-- Level 2 -->
  <rect x="250" y="52" width="180" height="84" rx="10" fill="rgb(250,238,218)" stroke="rgb(133,79,11)" stroke-width="0.5"/>
  <text x="340" y="78" text-anchor="middle" dominant-baseline="central" fill="rgb(99,56,6)" font-size="13" font-weight="500">Level 2</text>
  <text x="340" y="98" text-anchor="middle" dominant-baseline="central" fill="rgb(133,79,11)" font-size="12">Onboarding</text>
  <text x="340" y="116" text-anchor="middle" dominant-baseline="central" fill="rgb(133,79,11)" font-size="11">key + first domain (in app)</text>

  <line x1="432" y1="94" x2="458" y2="94" stroke="rgb(120,120,116)" stroke-width="1.2" marker-end="url(#arrow2)"/>

  <!-- Level 3 -->
  <rect x="460" y="52" width="180" height="84" rx="10" fill="rgb(238,237,254)" stroke="rgb(83,74,183)" stroke-width="0.5"/>
  <text x="550" y="78" text-anchor="middle" dominant-baseline="central" fill="rgb(60,52,137)" font-size="13" font-weight="500">Level 3</text>
  <text x="550" y="98" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-size="12">Connect the MCP</text>
  <text x="550" y="116" text-anchor="middle" dominant-baseline="central" fill="rgb(83,74,183)" font-size="11">(prompt) · agent can query</text>

  <line x1="340" y1="138" x2="340" y2="170" stroke="rgb(120,120,116)" stroke-width="1.2" marker-end="url(#arrow2)"/>

  <!-- Level 4 -->
  <rect x="40" y="172" width="600" height="60" rx="10" fill="rgb(225,245,238)" stroke="rgb(15,110,86)" stroke-width="0.5"/>
  <text x="60" y="195" dominant-baseline="central" fill="rgb(8,80,65)" font-size="13" font-weight="500">Level 4 (ongoing) — feed it &amp; query it</text>
  <text x="60" y="214" dominant-baseline="central" fill="rgb(15,110,86)" font-size="12">the more you add, the more context your agent has — the compounding second brain</text>

  <text x="40" y="262" fill="rgb(61,61,58)" font-size="12">Everything runs on your computer. Your knowledge stays private.</text>
</svg>
